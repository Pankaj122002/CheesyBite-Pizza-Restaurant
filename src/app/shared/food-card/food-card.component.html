<div class="card premium-card h-100">
  <div class="position-relative overflow-hidden">
    <img loading="lazy" [src]="menuItem.image" [alt]="menuItem.name" class="card-img-top food-image">
    <div class="position-absolute top-0 end-0 m-2">
      <span class="veg-badge bg-white" *ngIf="menuItem.isVeg">Veg</span>
      <span class="veg-badge bg-white text-danger border-danger" *ngIf="!menuItem.isVeg" style="color: #d32f2f !important; border-color: #d32f2f !important;">Non-Veg</span>
    </div>
  </div>
  
  <div class="card-body d-flex flex-column p-4">
    <h5 class="card-title fw-heading mb-2">{{ menuItem.name }}</h5>
    <p class="card-text text-secondary-custom small flex-grow-1">{{ menuItem.description }}</p>
    
    <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
      <div class="price">
        <span class="price-symbol">₹</span>{{ menuItem.price }}
      </div>
      
      <div class="actions">
        <ng-container *ngIf="(quantity$ | async) as quantity; else addToCartBtn">
          <div *ngIf="quantity > 0; else addToCartBtn" class="qty-controls">
            <button (click)="decrement()" aria-label="Decrease quantity">-</button>
            <div class="qty-value">{{ quantity }}</div>
            <button (click)="increment()" aria-label="Increase quantity">+</button>
          </div>
        </ng-container>
        <ng-template #addToCartBtn>
          <button (click)="addToCart()" class="btn btn-primary-custom px-4 py-2" style="font-size: 0.9rem;">
            Add to Cart
          </button>
        </ng-template>
      </div>
    </div>
  </div>
</div>
