<app-hero-banner
  title="Our Gallery"
  subtitle="A glimpse into our world of flavors"
  backgroundImage="assets/images/gallery-food-spread.webp">
</app-hero-banner>

<section class="section-padding bg-cream">
  <div class="container">
    
    <!-- Filter Pills -->
    <div class="filter-container mb-5 text-center overflow-auto whitespace-nowrap pb-2 animate-fadeInUp">
      <button *ngFor="let category of categories" 
              class="btn rounded-pill mx-1 mb-2 px-4 text-capitalize"
              [class.btn-primary-custom]="selectedCategory === category"
              [class.btn-outline-light]="selectedCategory !== category"
              (click)="filterByCategory(category)">
        {{ category }}
      </button>
    </div>

    <!-- Gallery Grid -->
    <div class="row g-4 masonry-grid">
      <div class="col-md-4 col-sm-6 animate-fadeInUp" *ngFor="let img of filteredImages; let i = index" [ngClass]="'delay-' + (i % 5 + 1)">
        <div class="gallery-card rounded overflow-hidden position-relative shadow-sm" (click)="openLightbox(img)" data-bs-toggle="modal" data-bs-target="#lightboxModal">
          <img loading="lazy" [src]="img.src" [alt]="img.caption" class="w-100 h-100 object-fit-cover gallery-img">
          <div class="gallery-overlay d-flex align-items-end p-3">
            <h5 class="text-white mb-0 fw-bold">{{ img.caption }}</h5>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox Modal -->
<div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-header border-0 pb-0 justify-content-end">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center p-0 position-relative" *ngIf="selectedImage">
        <img loading="lazy" [src]="selectedImage.src" [alt]="selectedImage.caption" class="img-fluid max-h-80vh rounded shadow-lg">
        <div class="mt-3 text-white">
          <h4 class="fw-bold">{{ selectedImage.caption }}</h4>
          <p class="text-capitalize opacity-75">{{ selectedImage.category }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
